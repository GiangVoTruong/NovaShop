spring.application.name=backend

# Cloud deploy (Railway, Render, …) inject PORT; local/Docker mặc định 8080
server.port=${PORT:8080}

# Swagger UI — giữ JWT sau khi Authorize (F5 vẫn còn token trong session trình duyệt)
springdoc.swagger-ui.persist-authorization=true

# Mật khẩu DB: file backend/.env (đọc lúc khởi động — xem BackendApplication, không commit)
# Tuỳ chọn: application-local.properties (cũng không commit)
spring.config.import=optional:classpath:application-local.properties

# Supabase Session pooler (IPv4) — ap-southeast-1, Connect → Session mode
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.wpjdybmidoqbjshqorfc
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema tạo bằng db/schema.sql trên Supabase SQL Editor
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Hikari — Supabase free tier giới hạn connection
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JWT — secret từ backend/.env (JWT_SECRET), tối thiểu 32 ký tự
app.jwt.secret=${JWT_SECRET:change-me-use-at-least-32-characters-secret!!}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Email verification OTP
app.verification.otp-length=6
app.verification.otp-expiry=5m
app.verification.max-attempts=5
app.verification.resend-cooldown=60s

# Mail — tạm gắn trực tiếp; sau này chuyển sang MAIL_* trong backend/.env
app.mail.enabled=true
# TODO: Gmail dùng để gửi OTP (điền email của bạn)
app.mail.from=claudelogina427@gmail.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# TODO: trùng với app.mail.from
spring.mail.username=claudelogina427@gmail.com
# TODO: App Password Gmail (Google Account → Security → App passwords), KHÔNG phải mật khẩu đăng nhập
spring.mail.password=pgqa pexj kmwv tygx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# VNPay — sandbox credentials từ backend/.env (VNPAY_TMN_CODE, VNPAY_HASH_SECRET)
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
app.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
app.vnpay.frontend-redirect-url=${VNPAY_FRONTEND_REDIRECT:http://localhost:5173}
app.vnpay.expire-minutes=15

# Stripe — credentials từ backend/.env (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET)
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.frontend-redirect-url=${STRIPE_FRONTEND_REDIRECT:http://localhost:5173}
app.stripe.currency=${STRIPE_CURRENCY:vnd}

# Google OAuth — client ID từ backend/.env (GOOGLE_CLIENT_ID)
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Upload — lưu local uploads/ (không cần DB)
app.upload.directory=uploads
app.upload.public-base-url=http://localhost:8080/uploads
app.upload.max-file-size-bytes=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
