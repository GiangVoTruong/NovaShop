spring.application.name=backend

# Mật khẩu DB: file backend/.env (đọc lúc khởi động — xem BackendApplication, không commit)
# Tuỳ chọn: application-local.properties (cũng không commit)
spring.config.import=optional:classpath:application-local.properties

# Supabase Session pooler (IPv4) — Connect → Session mode
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.equtixyatyhfihtksvny
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema tạo bằng db/schema.sql trên Supabase SQL Editor
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Hikari — Supabase free tier giới hạn connection
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
