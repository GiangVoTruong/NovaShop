services:
  - type: web
    name: novashop-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: docker/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
